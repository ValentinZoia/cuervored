name: Scrape San Lorenzo Matches

on:
  # Ejecutar manualmente desde GitHub
  workflow_dispatch:
  
  # Ejecutar automáticamente cada domingo a las 6:00 UTC
  schedule:
    - cron: '0 6 * * 0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Solo ejecutar si no hay un job corriendo
    concurrency:
      group: scrape-matches
      cancel-in-progress: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Install Chromium for scraping
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: Run scraping script
        run: npx tsx scripts/scrape-matches.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHROME_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          NODE_ENV: production
      
      - name: Report success
        if: success()
        run: echo "✅ Scraping completado exitosamente"
      
      - name: Report failure
        if: failure()
        run: echo "❌ El scraping falló"
